<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-Page</title>


    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,-50..200" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Work Sans", sans-serif;
        }

        html,
        body {
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        :root {
            --pcolor: #603BFE;
            --pcolor1: #7B2FF7;
            --hcolor: #9147FF;
            --dark: #1F1F1F;
            --ncolor: #bd00f7;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 100vh;
            padding: 10px;
        }

        .loginpage {
            display: grid;
            grid-template-columns: 1fr 1fr;
            max-width: 1200px;
            width: 100%;
            position: relative;
            overflow: hidden;
            box-shadow: 1px 1px 30px gray;
        }

        .loginpage::before {
            content: "";
            background: linear-gradient(125deg, #7923fa, #ee3bfeb0, rgba(3, 149, 207, 0.644)), url("./src/polygon.webp");
            position: absolute;
            inset: 0;
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% -60%);
        }




        .section1 {
            background: white;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 20px;
            width: 100%;
            gap: 5px;
        }

        .section1 h1 {
            font-size: 40px;
            margin-bottom: 10px;


        }

        .login-header {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }


        .login-header p,
        .login-header a {
            font-size: 15px;
            text-decoration: none;
        }

        .login-header a {
            color: #bd00f7;
        }

        .loginform {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .inputbox {
            position: relative;
        }

        .inputbox input,
        .inputbox select {
            padding: 15px 30px;
            width: 100%;
            border-radius: 7px;
            background: white;
            border: 1px solid rgba(128, 128, 128, 0.308);
            margin-bottom: 5px;
        }

         .inputbox input:focus{
            border: 1px solid var(--hcolor);
            outline: none;
         }

        .inputbox span {
            font-size: 20px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 5px;
            color: var(--ncolor);

        }

        .box {
            display: flex;
            justify-content: space-between;
            padding-block: 20px;
        }

        .box .fotget {
            color: var(--ncolor);
            text-decoration: none;
            font-size: 15px;
        }

        .check {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .check label {
            font-size: 15px;
        }

        .loginbtn {
            padding: 13px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 7px;
            border: none;
            background: linear-gradient(125deg, #9147FF, #ea47ff);
            color: white;
            transition: .6s ease;
        }

            .loginbtn:hover{
                transform: translateY(-5px);
                box-shadow: 1px 1px 10px #9147FF;
            }
        .loginfooter {
            display: flex;
            align-items: center;
            width: 100%;
            margin-block: 20px;
            gap: 10px;
        }

        .footericons {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footericons a {
            font-size: 30px;
            background: white;
            padding: 1px 40px;
            border-radius: 5px;
            transition: .6s ease;
        }

         .footericons a:hover{
            transform: scale(1.05);
            box-shadow: 1px 1px 10px rgba(0, 0, 0, 0.733);
         }

        .footericons a:first-child {
            background: #4767A0;
            font-size: 25px;
            padding: 4px 40px;
            color: white;
        }

        .footericons a:last-child {
            background: green;
            color: white;
        }

        .section2 {
            background: white;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            padding: 20px;
        }

        .logo {
            width: 160px;
            margin-bottom: 10px;
            z-index: 9999;
        }

        .section2 h1 {
            font-size: 50px;
            max-width: 250px;
            text-align: end;
            margin-bottom: 10px;
            z-index: 9999;
            color: white;
        }

        .section2 p {
            max-width: 250px;
            text-align: end;
            line-height: 1.5;
            z-index: 9999;
            font-size: 14px;
            color: white;
        }

        @media (max-width:800px) {
            .loginpage {
                grid-template-columns: 1fr;
            }

            .loginpage::before {
                display: none;
            }

            .section1 {
                align-items: center;
                order: 2;
            }

            .section1 h1 {
                font-size: 30px;
            }

            .login-header {
                flex-direction: column;
                gap: 5px;
                text-align: center;
            }

            .box {
                flex-direction: column;
                justify-content: center;
                text-align: center;
                gap: 10px;
            }


            .loginfooter {
                flex-direction: column;
                justify-content: center;
            }

            .section2 {
                order: 1;
                align-items: center;
                position: relative;
            }

            .section2::before {
                content: "";
                background: linear-gradient(125deg, #7923fa, #ee3bfeb0, rgba(3, 149, 207, 0.644)), url("./src/polygon.webp");
                position: absolute;
                inset: 0;
            }

            .section2 img {
                width: 150px;
            }


            .section2 h1 {
                text-align: center;
                font-size: 40px;

            }

            .section2 p {
                text-align: center;
                font-size: 15px;
            }

            .check{
                justify-content: center;
            }
        }
    </style>
</head>



<body>

    <div class="loginpage">
        <div class="section1">
            <h1>Login</h1>

            <div class="login-header">
                <p>Don't have an accout?</p>
                <a href="sign.html">Create New Account</a>

            </div>

            <div class="loginform">

                <div class="inputbox">
                    <span class="material-symbols-outlined callicon">person</span>
                    <select id="role">
                        <option value="">Select Your Role</option>
                        <option value="Admin">Admin</option>
                        <option value="Client">Client</option>
                    </select>
                           <p></p>
                </div>

                <div class="inputbox">
                    <span class="material-symbols-outlined callicon">email</span>
                    <input type="email" id="email" placeholder="Enter Your Email">
                    <p></p>
                </div>

                <div class="inputbox">
                    <span class="material-symbols-outlined callicon">visibility_off</span>
                    <input type="password" id="password" placeholder="Enter Your Email">
                    <p></p>
                </div>

                <div class="box">
                    <div>
                        <div class="check">
                            <input type="checkbox" id="checkbox"><label for="">Remember Me</label>
                        </div>
                        <p></p>
                    </div>
                    <a href="404.html" class="fotget">Forget Password?</a>
                </div>

                <button class="loginbtn">Login</button>
            </div>

            <div class="loginfooter">
                <p class="or">Or login with</p>

                <div class="footericons">
                    <a href=""><i class="fa-brands fa-facebook-f"></i></a>
                    <a href=""><i class="fa-brands fa-whatsapp"></i></a>
                </div>
            </div>


        </div>

        <div class="section2">
            <img src="./src/logo.webp" alt="Company Logo" class="logo">

            <h1>Welcome Back</h1>

            <p>Log in to book flights, track itineraries, and travel with confidence.</p>

        </div>
    </div>
</body>

</html>
