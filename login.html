<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-Page</title>


    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,-50..200" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Work Sans", sans-serif;
        }

        html,
        body {
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            background: gray;
        }

        .loginpage {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .section1 {
            background: red;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section1 h1 {
            font-size: 40px;
        }

        .section2 {
            background: blue;
        }

        .login-header{
            display: flex;
            gap: 10px;
        }

         .login-header p ,.login-header a{
            font-size: 15px;
            text-decoration: none;
         }
    </style>
</head>



<body>

    <div class="loginpage">
        <div class="section1">
            <h1>Login</h1>

            <div class="login-header">
                <p>Don't have an accout?</p>
                <a href="sign.html">Create New Account</a>

            </div>

            <div class="loginform">

                <div class="inputbox">
                    <select id="role">
                        <option value="">Select Your Role</option>
                        <option value="Admin">Admin</option>
                        <option value="Client">Client</option>
                    </select>
                </div>

                <div class="inputbox">
                    <span class="material-symbols-outlined callicon">email</span>
                    <input type="email" id="email" placeholder="Enter Your Email">
                    <p></p>
                </div>

                <div class="inputbox">
                    <span class="material-symbols-outlined callicon">visibility_off</span>
                    <input type="password" id="password" placeholder="Enter Your Email">
                    <p></p>
                </div>

                <div class="box">
                    <div>
                        <div>
                            <input type="checkbox" id="checkbox"><label for="">Remember Me</label>
                        </div>
                        <p></p>
                    </div>
                    <a href="404.html">Forget Password?</a>
                </div>

                <button class="Loginbtn">Login</button>
            </div>

            <div>
                <p>Or Login With</p>

                <div>
                    <a href=""><i class="fa-brands fa-facebook"></i></a>
                    <a href=""><i class="fa-brands fa-instagram"></i></a>
                </div>
            </div>


        </div>

        <div class="section2">
            <img src="./src/logo.webp" alt="Company Logo">

            <h1>Welcome Back</h1>

            <p>Log in to book flights, track itineraries, and travel with confidence.</p>

        </div>
    </div>
</body>

</html>
