<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404-page</title>

    <link href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,-50..200" />
</head>

<style>
    * {
        padding: 0px;
        margin: 0px;
        box-sizing: border-box;
        font-family: "Work Sans", sans-serif;
    }

    html,
    body {
        overflow-x: hidden;
        scroll-behavior: smooth;
    }

    :root {
        --pcolor: #603BFE;
        --pcolor1: #7B2FF7;
        --hcolor: #9147FF;
        --dark: #1F1F1F;
        --ncolor: #bd00f7;
    }


    body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        padding: 20px;
        overflow: hidden;
        position: relative;
        background: linear-gradient(135deg, #ffffff, #f6f0ff);
    }

    .bubbles {
        position: absolute;
        inset: 0;
        overflow: hidden;
        z-index: -1;
    }

    .bubble {
        position: absolute;
        bottom: -150px;
        border-radius: 50%;
        background: rgba(145, 71, 255, 0.25);
        backdrop-filter: blur(10px);
        animation: bubbleFloat linear infinite;
        filter: blur(2px);
    }

    /* Different sizes and positions */

    .bubble:nth-child(1) {
        width: 100px;
        height: 100px;
        left: 10%;
        animation-duration: 12s;
    }

    .bubble:nth-child(2) {
        width: 60px;
        height: 60px;
        left: 25%;
        animation-duration: 9s;
        animation-delay: 2s;
    }

    .bubble:nth-child(3) {
        width: 140px;
        height: 140px;
        left: 40%;
        animation-duration: 14s;
    }

    .bubble:nth-child(4) {
        width: 80px;
        height: 80px;
        left: 58%;
        animation-duration: 11s;
        animation-delay: 3s;
    }

    .bubble:nth-child(5) {
        width: 120px;
        height: 120px;
        left: 72%;
        animation-duration: 15s;
    }

    .bubble:nth-child(6) {
        width: 70px;
        height: 70px;
        left: 85%;
        animation-duration: 10s;
    }

    .bubble:nth-child(7) {
        width: 50px;
        height: 50px;
        left: 92%;
        animation-duration: 8s;
    }

    .bubble:nth-child(8) {
        width: 160px;
        height: 160px;
        left: 5%;
        animation-duration: 18s;
    }

    @keyframes bubbleFloat {
        0% {
            transform: translateY(0) scale(0.8);
            opacity: 0;
        }

        20% {
            opacity: .8;
        }

        100% {
            transform: translateY(-120vh) scale(1.2);
            opacity: 0;
        }
    }

    .error-pages {
        max-width: 500px;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
    }


    .error-pages * {
        margin: 0;
    }



    .tag {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: clamp(11px, 1.2vw, 13px);
        padding: 6px 20px;
        border-radius: 20px;
        margin-bottom: 20px;
        color: black;
    }


    .tag span {
        font-size: clamp(15px, 1.7vw, 18px);
        color: var(--ncolor);
    }

    .error-pages h1 {
        font-size: clamp(100px, 15vw, 200px);
        font-family: "Changa One", sans-serif;
        font-weight: 400;
        line-height: 0.8;
        margin-bottom: 15px;
        background: linear-gradient(125deg, #8a3cff, rgb(255, 0, 221), #9900ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: floating 3s ease-in-out infinite;
    }

    @keyframes floating {

        0%,
        100% {
            transform: translateY(0px);
        }

        50% {
            transform: translateY(-20px);
        }
    }

    .error-pages h2 {
        font-size: clamp(20px, 2.5vw, 30px);
        text-align: center;
        line-height: 1.3;
        margin-bottom: 10px;
    }

    .description {
        font-size: clamp(13px, 1.4vw, 15px);
        text-align: center;
        margin-bottom: 20px;
        line-height: 1.3;
        color: gray;

    }

    .btns button {
        padding: 15px 30px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 7px;
        background: linear-gradient(125deg, #9147FF, #ea47ff);
        color: white;
        transition: .6s ease;
    }

    .btns button:hover {
        transform: translateY(-5px);
        box-shadow: 1px 1px 20px gray;
    }

    @media (max-width:400px) {
        .btns {
            display: flex;
            flex-direction: column;
            width: 80%;
            gap: 10px;
        }

        .btns button {
            padding: 13px 30px;
            font-size: 15px;
        }

        .tag {
            padding: 4px 10px;
        }


        .btns button {
            padding: 12px 30px;
            font-size: 14px;
        }
    }
</style>

<body>
    <div class="bubbles">
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
    </div>
    <div class="error-pages">
        <p class="tag"><span class="material-symbols-outlined">
                travel
            </span>Flight Status Update</p>

        <h1>404</h1>

        <h2>This Flight Couldn't Reach Its Destination</h2>

        <p class="description">
            The page you're looking for may have been moved, removed,
            or never scheduled for departure. Please check the URL
            or return to the homepage to continue your journey.
        </p>

        <div class="btns">
            <button class="navhome">Back to Home</button>
            <button class="goback">Go Back</button>
        </div>
    </div>


</body>

<script>
    const homeBtn = document.querySelector(".navhome");
    const backBtn = document.querySelector(".goback");

    homeBtn.addEventListener("click", () => {
        window.location.href = "index.html";
    });

    backBtn.addEventListener("click", () => {
        window.history.back();
    });
</script>

</html>
