<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404-page</title>

    <link href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,-50..200" />
</head>

<style>
    * {
        padding: 0px;
        margin: 0px;
        box-sizing: border-box;
        font-family: "Work Sans", sans-serif;
    }

    html,
    body {
        overflow-x: hidden;
        scroll-behavior: smooth;
    }

    body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        padding: 20px;
    }


    .error-pages {
        max-width: 500px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    
    .error-pages * {
        margin: 0;
    }



    .tag {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: clamp(12px, 1.4vw, 15px);
        border: 1px solid black;
        padding: clamp(5px, 0.7vw, 10px) clamp(10px,1.6vw,20px);
        border-radius: 20px;
        margin-bottom: 10px;
    }

    .tag span {
        font-size: clamp(15px,1.8vw,20px);
    }

    .error-pages h1 {
        font-size: clamp(100px, 15vw, 200px);
        font-family: "Changa One", sans-serif;
        font-weight: 400;
        line-height: 0.8;
        margin-bottom: 15px;
    }

    .error-pages h2 {
        font-size: clamp(20px, 2.5vw, 30px);
        text-align: center;
        line-height: 1.3;
        margin-bottom: 10px;
    }

    .description {
        font-size: clamp(13px, 1.4vw, 15px);
        text-align: center;
        margin-bottom: 20px;
        line-height: 1.3;

    }

    .btns button {
        padding: 15px 30px;
        font-size: 16px;
        font-weight: 600;
        border: 1px solid gray;
        border-radius: 7px;
    }

    @media (max-width:400px) {
        .btns {
            display: flex;
            flex-direction: column;
            width: 90%;
            gap: 10px;
        }

        .btns button {
            padding: 13px 30px;
            font-size: 15px;
        }
    }
</style>

<body>
    <div class="error-pages">
        <p class="tag"><span class="material-symbols-outlined">
                travel
            </span>Flight Status Update</p>

        <h1>404</h1>

        <h2>This Flight Couldn't Reach Its Destination</h2>

        <p class="description">
            The page you're looking for may have been moved, removed,
            or never scheduled for departure. Please check the URL
            or return to the homepage to continue your journey.
        </p>

        <div class="btns">
            <button>Back to Home</button>
            <button>Go Back</button>
        </div>
    </div>
</body>

</html>
